<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ateliê Adriana Castro Crochê</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#F8F6F2;
    color:#333;
}

header{
    background:#6B2FA3;
    color:white;
    text-align:center;
    padding:35px;
}

header img{
    width:120px;
    margin-bottom:15px;
}

header h1{
    font-size:34px;
}

header p{
    margin-top:10px;
}

.produtos{

    max-width:1200px;
    margin:50px auto;

    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));

    gap:30px;
    padding:20px;
}

.card{

    background:white;

    border-radius:15px;

    overflow:hidden;

    box-shadow:0 8px 20px rgba(0,0,0,.08);

    transition:.3s;

}

.card:hover{

    transform:translateY(-5px);

}

.card img{

    width:100%;
    height:260px;

    object-fit:cover;

}

.info{

    padding:20px;

}

h2{

    color:#6B2FA3;

    margin-bottom:10px;

}

.preco{

    font-size:22px;

    font-weight:bold;

    margin:15px 0;

}

label{

    display:block;

    margin-bottom:8px;

}

input[type=number]{

    width:80px;

    padding:8px;

    border-radius:8px;

    border:1px solid #ccc;

}

button{

    margin-top:20px;

    width:100%;

    padding:15px;

    background:#6B2FA3;

    color:white;

    border:none;

    border-radius:10px;

    font-size:16px;

    cursor:pointer;

    transition:.3s;

}

button:hover{

    background:#542184;

}

footer{

    background:white;

    text-align:center;

    padding:25px;

    margin-top:40px;

}

</style>

</head>

<body>

<header>

    <!-- Troque pela sua logo -->
    <img src="logo.png">

    <h1>Ateliê Adriana Castro Crochê</h1>

    <p>Peças feitas à mão com carinho ❤️</p>

</header>

<section class="produtos">

<div class="card">

<img src="produto1.jpg">

<div class="info">

<h2>Jogo Americano</h2>

<p>Peça artesanal em crochê.</p>

<div class="preco">R$ 120,00</div>

<label>Quantidade</label>

<input type="number" value="1" min="1" id="qtd1">

<button onclick="comprar('Jogo Americano',120,'qtd1')">

Pedir pelo WhatsApp

</button>

</div>

</div>

<div class="card">

<img src="produto2.jpg">

<div class="info">

<h2>Sousplat</h2>

<p>Sousplat em crochê.</p>

<div class="preco">R$ 35,00</div>

<label>Quantidade</label>

<input type="number" value="1" min="1" id="qtd2">

<button onclick="comprar('Sousplat',35,'qtd2')">

Pedir pelo WhatsApp

</button>

</div>

</div>

<div class="card">

<img src="produto3.jpg">

<div class="info">

<h2>Caminho de Mesa</h2>

<p>Modelo artesanal.</p>

<div class="preco">R$ 180,00</div>

<label>Quantidade</label>

<input type="number" value="1" min="1" id="qtd3">

<button onclick="comprar('Caminho de Mesa',180,'qtd3')">

Pedir pelo WhatsApp

</button>

</div>

</div>

</section>

<footer>

© 2026 Ateliê Adriana Castro Crochê

</footer>

<script>

function comprar(produto, preco, id){

let qtd=document.getElementById(id).value;

let total=qtd*preco;

// Coloque seu número abaixo (55 + DDD + número)
let numero="5511995575382";

let mensagem=
`Olá! 😊

Gostaria de fazer um pedido.

🧶 Produto: ${produto}

📦 Quantidade: ${qtd}

💰 Valor Total: R$ ${total.toFixed(2)}

Aguardo seu retorno.`;

let url=`https://wa.me/${numero}?text=${encodeURIComponent(mensagem)}`;

window.open(url,"_blank");

}

</script>

</body>
</html>
